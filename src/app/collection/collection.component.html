<h1 class="title">{{ category | titlecase }} Collection</h1>

<div class="product-container">

  <div class="product-card" *ngFor="let product of products">

    <img [src]="product.image" [alt]="product.name">

    <h3>{{ product.name }}</h3>

    <a [routerLink]="['/']" fragment="contact" class="buy-btn">
  Buy Now
</a>

  </div>

</div>
